name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: ./auth-service
          - service: landing-page
            context: ./landing-page
          - service: hello-world-app
            context: ./hello-world-app
          - service: lol-tracking-service
            context: ./lol-tracking-service
          - service: hearts-game-service
            context: ./hearts-game-service
          - service: training-peaks-service
            context: ./training-peaks-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare image owner
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/microservices-platform-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/microservices-platform-${{ matrix.service }}:${{ github.sha }}
          platforms: linux/arm64

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare image owner
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new images
        run: |
          GHCR_OWNER="${{ steps.prep.outputs.owner_lc }}" IMAGE_TAG=latest docker compose pull auth-service landing-page hello-world-app lol-tracking-service hearts-game-service training-peaks-service

      - name: Restart containers
        run: |
          GHCR_OWNER="${{ steps.prep.outputs.owner_lc }}" IMAGE_TAG=latest docker compose up -d --remove-orphans --no-build
