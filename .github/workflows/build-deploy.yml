name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth-service: 'auth-service/**'
            landing-page: 'landing-page/**'
            hello-world-app: 'hello-world-app/**'
            lol-tracking-service: 'lol-tracking-service/**'
            hearts-game-service: 'hearts-game-service/**'
            training-peaks-service: 'training-peaks-service/**'

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare image owner
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/microservices-platform-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.owner_lc }}/microservices-platform-${{ matrix.service }}:${{ github.sha }}
          platforms: linux/arm64

  # This job acts as a single status check for GitHub's Branch Protection Rules
  # It evaluates to true if all builds succeed OR if they are skipped safely.
  pr-checks-passed:
    needs: build-and-push
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify build success
        run: |
          if [ "${{ needs.build-and-push.result }}" == "failure" ] || [ "${{ needs.build-and-push.result }}" == "cancelled" ]; then
            echo "Matrix build failed or was cancelled."
            exit 1
          fi
          echo "All builds successful or strategically skipped."

  deploy:
    needs: build-and-push
    # Allows deployment if build-and-push succeeded OR if it was skipped (because no services changed)
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /home/kl/deploy/microservices-platform
    steps:
      - name: Prepare image owner
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Update deploy checkout
        run: |
          set -e
          if [ ! -d "${DEPLOY_DIR}/.git" ]; then
            git clone "${{ github.server_url }}/${{ github.repository }}.git" "${DEPLOY_DIR}"
          fi

          cd "${DEPLOY_DIR}"
          git fetch origin
          git checkout main
          git pull --ff-only origin main
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull new images
        run: |
          cd "${DEPLOY_DIR}"
          GHCR_OWNER="${{ steps.prep.outputs.owner_lc }}" IMAGE_TAG=latest docker compose pull auth-service landing-page hello-world-app lol-tracking-service hearts-game-service training-peaks-service

      - name: Restart containers
        run: |
          cd "${DEPLOY_DIR}"
          GHCR_OWNER="${{ steps.prep.outputs.owner_lc }}" IMAGE_TAG=latest docker compose up -d --remove-orphans --no-build
